<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Apteka Dashboard</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }body{
  background:#f3f4f6;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:250px;
  height:100vh;
  background:#111827;
  color:white;
  padding:20px;
}

.sidebar h2{
  margin-bottom:30px;
  font-size:22px;
}

.sidebar ul{
  list-style:none;
}

.sidebar ul li{
  padding:12px;
  margin-bottom:10px;
  background:#1f2937;
  border-radius:8px;
  cursor:pointer;
}

.sidebar ul li:hover{
  background:#2563eb;
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h3{
  color:#2563eb;
  margin-bottom:10px;
}

.table{
  margin-top:30px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

table th, table td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

table th{
  background:#f9fafb;
}

  </style>
</head>
<body>  <div class="sidebar">
    <h2>Smart Apteka</h2>
    <ul>
      <li>📊 Dashboard</li>
      <li>📦 Ombor</li>
      <li>💰 Sotuv</li>
      <li>📈 Hisobot</li>
      <li>⚙️ Sozlamalar</li>
    </ul>
  </div>  <div class="main"><div class="topbar">
  <h2>Dashboard</h2>
  <p>Admin panel</p>
</div>

<div class="cards">

  <div class="card">
    <h3>Bugungi Sotuv</h3>
    <p>1,250,000 so‘m</p>
  </div>

  <div class="card">
    <h3>Mahsulotlar</h3>
    <p>320 ta</p>
  </div>

  <div class="card">
    <h3>Xodimlar</h3>
    <p>8 ta</p>
  </div>

  <div class="card">
    <h3>Buyurtmalar</h3>
    <p>24 ta</p>
  </div>

</div>

<div class="table">
  <h3>So‘nggi sotuvlar</h3>
  <table>
    <tr>
      <th>Dori nomi</th>
      <th>Miqdor</th>
      <th>Narx</th>
    </tr>
    <tr>
      <td>Paracetamol</td>
      <td>2</td>
      <td>20,000</td>
    </tr>
    <tr>
      <td>Ibuprofen</td>
      <td>1</td>
      <td>15,000</td>
    </tr>
  </table>
</div>

  </div></body>
</html>
